name: Build and Deploy Nexo v2

on:
  push:
    branches: [main]
    paths:
      - 'nexo-v2/**'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: nexo-v2/package-lock.json

      - name: Install dependencies
        working-directory: nexo-v2
        run: npm ci

      - name: Build
        working-directory: nexo-v2
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync nexo-v2/dist/ s3://domian.cl/nexo/v2/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "*.html"
          aws s3 cp nexo-v2/dist/index.html s3://domian.cl/nexo/v2/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DIST_ID }} \
            --paths "/nexo/v2/*"
