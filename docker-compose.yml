services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accesomina
      POSTGRES_USER: accesomina
      POSTGRES_PASSWORD: accesomina
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accesomina"]
      interval: 5s
      timeout: 3s
      retries: 20
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://accesomina:accesomina@postgres:5432/accesomina
    ports: ["8088:8088"]
    volumes: ["uploads_data:/app/uploads"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8088/api/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
  uploads_data:
